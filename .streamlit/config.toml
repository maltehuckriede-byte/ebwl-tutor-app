[theme]
base = "dark"

# Ein leuchtendes, modernes Saphirblau - perfekt ablesbar und frisch im Dark-Mode!
primaryColor = "#3B82F6"

# Der Hintergrund: Ein extrem sattes, fast schwarzes Tiefen-Graublau (Obsidian)
backgroundColor = "#0B0F19"

# Die Seitenleiste & Kacheln: Klar abgehoben durch ein helleres Nachtblau
secondaryBackgroundColor = "#1A2235"

# Brillantes, weiches Weiß für perfekte Lesbarkeit ohne zu blenden
textColor = "#F8FAFC"

font = "sans serif"
