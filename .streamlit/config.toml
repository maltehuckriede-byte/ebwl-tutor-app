[theme]
# Wir sagen Streamlit, dass dies grundsätzlich ein Dark-Mode ist. 
# Dadurch färbt Streamlit interne Elemente (wie Dropdowns oder Textfelder) automatisch passend dunkel ein.
base = "dark"

# Euer RWTH-Blau für die primären Buttons (z.B. "Lern-Sitzung starten")
primaryColor = "#00549F"

# Das tiefe Nachtblau für den Haupt-Hintergrund (Chat & Dashboard)
backgroundColor = "#0F172A"

# Das weiche Dunkelgrau-Blau für die Seitenleiste und die Dashboard-Kacheln
secondaryBackgroundColor = "#1E293B"

# Ein sanftes, blendfreies Weiß für perfekte Lesbarkeit
textColor = "#F8FAFC"

# Moderne, cleane Schriftart
font = "sans serif"
